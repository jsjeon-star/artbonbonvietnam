<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ART BONBON — Education Vietnam 2026 Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=DM+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#f4f8fc;}
#app{width:100vw;height:100vh;background:#f4f8fc;font-family:'Baloo 2',sans-serif;display:grid;grid-template-columns:400px 1fr;grid-template-rows:64px 1fr;overflow:hidden;}
.header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:#fff;border-bottom:1.5px solid #daeeff;z-index:2;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-logo{width:44px;height:44px;object-fit:contain;}
.brand-text h1{font-size:20px;font-weight:800;color:#1a1a1a;letter-spacing:.5px;line-height:1.1;}
.brand-text span{font-size:9px;color:#29abe2;letter-spacing:2px;text-transform:uppercase;font-weight:600;}
.header-right{display:flex;align-items:center;gap:12px;}
.count-badge{display:flex;align-items:center;gap:7px;background:#eaf6fd;border:1.5px solid #a8dff5;border-radius:50px;padding:5px 18px;}
.count-badge .num{font-size:24px;font-weight:800;color:#0e9fd8;line-height:1;}
.count-badge .lbl{font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:1.5px;}
.upload-btn{padding:9px 22px;background:linear-gradient(135deg,#29abe2,#00d2ff);border:none;border-radius:50px;font-family:'Baloo 2',sans-serif;font-size:13px;font-weight:700;color:#fff;cursor:pointer;box-shadow:0 3px 14px rgba(41,171,226,.35);transition:transform .15s,box-shadow .15s;}
.upload-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(41,171,226,.5);}
.upload-btn:active{transform:translateY(0);}
#map-wrap{display:flex;align-items:center;justify-content:center;padding:16px;background:#f4f8fc;overflow:hidden;}
.map-container{position:relative;}
.map-canvas{display:block;}
#pins-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.pin-el{position:absolute;transform:translate(-50%,-50%);cursor:pointer;transition:transform .18s;pointer-events:all;}
.pin-el:hover{transform:translate(-50%,-50%) scale(1.2);}
.pin-img{width:24px;height:24px;border-radius:50%;border:2px solid #fff;object-fit:cover;box-shadow:0 2px 6px rgba(0,0,0,.18);display:block;}
.pin-ring{position:absolute;top:50%;left:50%;width:32px;height:32px;border-radius:50%;transform:translate(-50%,-50%);opacity:.25;}
.gallery-panel{background:#fff;border-left:1.5px solid #daeeff;display:flex;flex-direction:column;overflow:hidden;}
.panel-header{padding:14px 24px 12px;border-bottom:1px solid #eaf4fb;display:flex;align-items:center;flex-shrink:0;}
.panel-label{font-size:9px;font-weight:700;color:#bbb;letter-spacing:2px;text-transform:uppercase;}
.slogan-bar{padding:14px 24px 0;flex-shrink:0;}
.slogan{font-family:'DM Sans',sans-serif;font-size:24px;font-style:italic;font-weight:600;color:#29abe2;letter-spacing:-.2px;line-height:1.3;}
.thumb-grid{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 20px;display:grid;grid-template-columns:repeat(5,1fr);gap:10px;align-content:start;}
.thumb-grid::-webkit-scrollbar{width:3px;}
.thumb-grid::-webkit-scrollbar-thumb{background:#c8e8f7;border-radius:2px;}
.thumb{aspect-ratio:1.414/1;border-radius:10px;overflow:hidden;border:1.5px solid #daeeff;cursor:pointer;position:relative;transition:transform .18s,border-color .18s,box-shadow .18s;}
.thumb:hover{transform:scale(1.02);border-color:#29abe2;box-shadow:0 4px 14px rgba(41,171,226,.2);}
.thumb:hover .delete-btn{opacity:1;}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.thumb .new-badge{position:absolute;top:6px;left:6px;font-size:8px;font-weight:700;color:#fff;background:#29abe2;border-radius:4px;padding:2px 6px;}
.delete-btn{position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;background:rgba(220,50,50,.85);border:none;color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .18s;z-index:10;}
.delete-btn:hover{background:rgba(200,20,20,1);}
.panel-footer{padding:14px 24px;border-top:1px solid #eaf4fb;flex-shrink:0;}
.panel-upload-btn{width:100%;padding:11px;background:linear-gradient(135deg,#29abe2,#00d2ff);border:none;border-radius:10px;font-family:'Baloo 2',sans-serif;font-size:13px;font-weight:700;color:#fff;cursor:pointer;box-shadow:0 2px 8px rgba(41,171,226,.3);transition:opacity .15s;}
.panel-upload-btn:hover{opacity:.9;}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:200;}
.lightbox.open{display:flex;}
.lb-inner{position:relative;max-width:80vw;max-height:80vh;border-radius:16px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.25);}
.lb-inner img.lb-art{display:block;max-width:80vw;max-height:80vh;object-fit:contain;}
.lb-close{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.45);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.lb-close:hover{background:rgba(41,171,226,.9);}
.lb-author{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.6));padding:28px 16px 12px;font-family:'Baloo 2',sans-serif;color:#fff;font-size:15px;font-weight:700;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:300;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border:1px solid #daeeff;border-radius:20px;padding:28px;width:400px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.1);}
.modal h2{font-size:20px;font-weight:800;color:#1a1a1a;margin-bottom:4px;}
.modal .sub{font-size:12px;color:#aaa;margin-bottom:20px;}
.drop-zone{border:2px dashed #a8dff5;border-radius:12px;padding:28px 18px;text-align:center;color:#ccc;font-size:13px;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:14px;min-height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.drop-zone:hover{border-color:#29abe2;background:#f0fbff;}
.dz-icon{font-size:32px;}
.dz-preview{width:100%;max-height:150px;object-fit:contain;border-radius:8px;display:none;}
.modal-input{width:100%;background:#f4f8fc;border:1.5px solid #daeeff;border-radius:10px;padding:10px 14px;color:#1a1a1a;font-family:'Baloo 2',sans-serif;font-size:14px;outline:none;margin-bottom:14px;}
.modal-input:focus{border-color:#29abe2;background:#fff;}
.modal-input::placeholder{color:#ccc;}
.modal-footer{display:flex;gap:10px;}
.btn-cancel{flex:1;padding:11px;background:#f4f8fc;border:1.5px solid #daeeff;border-radius:10px;color:#999;font-family:'Baloo 2',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;}
.btn-cancel:hover{background:#e6f4fb;}
.btn-submit{flex:2;padding:11px;background:linear-gradient(135deg,#29abe2,#00d2ff);border:none;border-radius:10px;color:#fff;font-family:'Baloo 2',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s;}
.btn-submit:hover{opacity:.9;}
#file-input{display:none;}
@keyframes pin-drop{0%{transform:translate(-50%,-50%) scale(0) translateY(-10px);opacity:0;}65%{transform:translate(-50%,-50%) scale(1.2);opacity:1;}100%{transform:translate(-50%,-50%) scale(1);opacity:1;}}
.pin-el.new{animation:pin-drop .4s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes thumb-in{0%{transform:scale(0);opacity:0;}70%{transform:scale(1.1);}100%{transform:scale(1);opacity:1;}}
.thumb-new{animation:thumb-in .35s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes count-pop{0%{transform:scale(1);}50%{transform:scale(1.4);}100%{transform:scale(1);}}
.count-pop{animation:count-pop .3s ease;}
</style>
</head>

const COLORS=['#29abe2','#00c2f0','#0e9fd8','#1abc9c','#3498db','#9b59b6','#e74c3c','#f0a500','#2ecc71','#e91e63','#ffc107','#00bcd4'];
let arts=[],colorIdx=0,selectedFiles=[];

// 9밴드 균등 배치 — 덜 쓰인 밴드 우선
let bandQueues = Array.from({length:9}, ()=>[]);
LAND_POINTS.forEach((p,i)=>{
  const b=Math.min(Math.floor(p[1]*9),8);
  bandQueues[b].push(i);
});
// 각 밴드를 shuffle
bandQueues.forEach(q=>{
  for(let i=q.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [q[i],q[j]]=[q[j],q[i]];
  }
});
let bandCursors = new Array(9).fill(0);
let globalCursor = 0;

function randPos(){
  // 가장 덜 쓰인 밴드 선택
  let minUsed = Infinity;
  let candidates = [];
  for(let b=0;b<9;b++){
    const used = bandCursors[b];
    const total = bandQueues[b].length;
    if(total===0) continue;
    const ratio = used / total;
    if(ratio < minUsed - 0.001) { minUsed=ratio; candidates=[b]; }
    else if(ratio < minUsed + 0.001) { candidates.push(b); }
  }
  const band = candidates[Math.floor(Math.random()*candidates.length)];
  const queue = bandQueues[band];
  const idx = queue[bandCursors[band] % queue.length];
  bandCursors[band]++;
  return {xPct: LAND_POINTS[idx][0], yPct: LAND_POINTS[idx][1]};
}

const MAP_RATIO=335/701;
function renderMap(){
  const img=document.getElementById('map-src');
  const wrap=document.getElementById('map-wrap');
  const canvas=document.getElementById('map-canvas');
  const availH=wrap.offsetHeight||640;
  const availW=wrap.offsetWidth||400;
  let ch=availH, cw=Math.round(ch*MAP_RATIO);
  if(cw>availW){cw=availW;ch=Math.round(cw/MAP_RATIO);}
  canvas.width=cw;canvas.height=ch;
  canvas.style.width=cw+'px';canvas.style.height=ch+'px';
  document.getElementById('app').style.gridTemplateColumns=(cw+32)+'px 1fr';
  const ctx=canvas.getContext('2d');
  ctx.drawImage(img,0,0,cw,ch);
  const imageData=ctx.getImageData(0,0,cw,ch);
  const d=imageData.data;
  for(let i=0;i<d.length;i+=4){
    const r=d[i],g=d[i+1],b=d[i+2];
    if(r<30&&g<30&&b<30){
      d[i]=244;d[i+1]=248;d[i+2]=252;d[i+3]=0;
    } else if(r>120&&g<80&&b<80){
      d[i]=219;d[i+1]=238;d[i+2]=248;d[i+3]=255;
    } else {
      const lum=(r*0.299+g*0.587+b*0.114)/255;
      d[i]=Math.round(150+lum*60);
      d[i+1]=Math.round(180+lum*50);
      d[i+2]=Math.round(210+lum*30);
      d[i+3]=255;
    }
  }
  ctx.putImageData(imageData,0,0);
}
// ── IndexedDB 설정 ──────────────────────────────
const DB_NAME='artbonbon';const DB_VER=1;const STORE='arts';
let db=null;

function openDB(cb){
  if(db)return cb(db);
  const req=indexedDB.open(DB_NAME,DB_VER);
  req.onupgradeneeded=function(e){
    e.target.result.createObjectStore(STORE,{keyPath:'id'});
  };
  req.onsuccess=function(e){db=e.target.result;cb(db);};
  req.onerror=function(){console.warn('IndexedDB open error');};
}

function saveToStorage(){
  openDB(function(db){
    const tx=db.transaction(STORE,'readwrite');
    const store=tx.objectStore(STORE);
    store.clear();
    arts.forEach(function(art){store.put(art);});
    // meta 저장은 localStorage로 (작은 데이터)
    try{
      localStorage.setItem('artbonbon_colorIdx',String(colorIdx));
      localStorage.setItem('artbonbon_bandCursors',JSON.stringify(bandCursors));
    }catch(e){}
  });
}

function loadFromStorage(){
  try{
    const savedColor=localStorage.getItem('artbonbon_colorIdx');
    const savedCursors=localStorage.getItem('artbonbon_bandCursors');
    if(savedColor)colorIdx=parseInt(savedColor)||0;
    if(savedCursors){const p=JSON.parse(savedCursors);if(Array.isArray(p)&&p.length===9)bandCursors=p;}
  }catch(e){}

  openDB(function(db){
    const tx=db.transaction(STORE,'readonly');
    const req=tx.objectStore(STORE).getAll();
    req.onsuccess=function(e){
      const loaded=e.target.result||[];
      if(loaded.length===0)return;
      // 최신순 정렬 (id는 'a'+timestamp)
      // id = 'a' + timestamp → 숫자 부분 추출해서 내림차순 정렬 (최신이 앞)
      loaded.sort(function(a,b){
        const ta=parseInt(a.id.replace('a',''))||0;
        const tb=parseInt(b.id.replace('a',''))||0;
        return tb-ta;
      });
      loaded.forEach(function(art){
        if(art&&art.id&&art.imgSrc&&art.pos){
          arts.push(art);
          addPin(art.id,art.imgSrc,art.author||'Anonymous',art.pos,art.color||'#29abe2');
        }
      });
      // 항상 최신순 정렬
      arts.sort(function(a,b){
        const ta=parseInt(a.id.replace('a',''))||0;
        const tb=parseInt(b.id.replace('a',''))||0;
        return tb-ta;
      });
      rebuildGrid();
      updateCount();
      var g=document.getElementById('thumb-grid');
      if(g){g.scrollTop=0;}
    };
    req.onerror=function(){console.warn('IndexedDB load error');};
  });
}

function compressImage(dataUrl,callback){
  const img=new Image();
  img.onload=function(){
    const MAX=800;
    let w=img.width,h=img.height;
    if(w>MAX||h>MAX){
      if(w>h){h=Math.round(h*MAX/w);w=MAX;}
      else{w=Math.round(w*MAX/h);h=MAX;}
    }
    const c=document.createElement('canvas');
    c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    callback(c.toDataURL('image/jpeg',0.8));
  };
  img.src=dataUrl;
}

window.addEventListener('load',function(){
  const img=document.getElementById('map-src');
  function init(){
    renderMap();
    requestAnimationFrame(function(){
      requestAnimationFrame(loadFromStorage);
    });
  }
  if(img.complete){init();}else{img.addEventListener('load',init);}
});
window.addEventListener('resize',function(){
  const img=document.getElementById('map-src');if(img.complete)renderMap();
});

function openModal(){document.getElementById('modal-bg').classList.add('open');}
function closeModal(){
  document.getElementById('modal-bg').classList.remove('open');
  document.getElementById('file-input').value='';
  document.getElementById('dz-preview').style.display='none';
  document.getElementById('dz-icon').style.display='block';
  document.getElementById('dz-text').textContent='Click or drop your artwork here';
  document.getElementById('input-author').value='';
  selectedFiles=[];
}
function handleModalBg(e){if(e.target===document.getElementById('modal-bg'))closeModal();}
function onFileSelect(e){
  const files=Array.from(e.target.files);if(!files.length)return;
  selectedFiles=files;
  const p=document.getElementById('dz-preview');
  const r=new FileReader();
  r.onload=(ev)=>{
    p.src=ev.target.result;p.style.display='block';
    document.getElementById('dz-icon').style.display='none';
    document.getElementById('dz-text').textContent=files.length>1?files.length+'개 파일 선택됨':files[0].name;
  };
  r.readAsDataURL(files[0]);
}
const dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.style.borderColor='#29abe2';});
dz.addEventListener('dragleave',()=>{dz.style.borderColor='#a8dff5';});
dz.addEventListener('drop',e=>{
  e.preventDefault();dz.style.borderColor='#a8dff5';
  const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'));
  if(!files.length)return;
  selectedFiles=files;
  const r=new FileReader();
  r.onload=(ev)=>{
    const p=document.getElementById('dz-preview');
    p.src=ev.target.result;p.style.display='block';
    document.getElementById('dz-icon').style.display='none';
    document.getElementById('dz-text').textContent=files.length>1?files.length+'개 파일 선택됨':files[0].name;
  };
  r.readAsDataURL(files[0]);
});
function submitArt(){
  if(!selectedFiles||!selectedFiles.length){alert('Please select an image first!');return;}
  const author=document.getElementById('input-author').value||'Anonymous';
  let idx=0;
  function processNext(){
    if(idx>=selectedFiles.length){closeModal();return;}
    const f=selectedFiles[idx++];
    const r=new FileReader();
    r.onload=(ev)=>{placeArt(ev.target.result,author,processNext);};
    r.readAsDataURL(f);
  }
  processNext();
}
function placeArt(imgSrc,author,onDone){
  compressImage(imgSrc,function(compressed){
    const pos=randPos();
    const color=COLORS[colorIdx%COLORS.length];colorIdx++;
    const id='a'+Date.now();
    arts.unshift({id,imgSrc:compressed,author,pos,color});
    // 항상 최신순 정렬 유지
    arts.sort(function(a,b){
      const ta=parseInt(a.id.replace('a',''))||0;
      const tb=parseInt(b.id.replace('a',''))||0;
      return tb-ta;
    });
    addPin(id,compressed,author,pos,color);
    rebuildGrid();
    updateCount();
    saveToStorage();
    if(onDone)setTimeout(onDone,50);
  });
}
function addPin(id,imgSrc,author,pos,color){
  const overlay=document.getElementById('pins-overlay');
  const el=document.createElement('div');
  el.className='pin-el new';el.dataset.id=id;
  el.style.left=(pos.xPct*100)+'%';
  el.style.top=(pos.yPct*100)+'%';
  el.innerHTML='<div class="pin-ring" style="background:'+color+';"></div><img class="pin-img" src="'+imgSrc+'" style="border-color:'+color+';"/>';
  el.addEventListener('click',()=>openLightbox(id));
  overlay.appendChild(el);
}
function rebuildGrid(){
  // 항상 최신순 정렬 보장
  arts.sort(function(a,b){
    var ta=parseInt((a.id||'').replace('a',''))||0;
    var tb=parseInt((b.id||'').replace('a',''))||0;
    return tb-ta;
  });
  var grid=document.getElementById('thumb-grid');
  grid.innerHTML='';
  arts.forEach(function(art,i){
    var div=document.createElement('div');
    div.className='thumb'+(i===0?' thumb-new':'');
    div.style.borderColor=i===0?art.color:'#daeeff';
    div.innerHTML='<img src="'+art.imgSrc+'" alt="'+art.author+'"/>'+(i===0?'<div class="new-badge">NEW</div>':'')+'<button class="delete-btn" title="Delete">✕</button>';
    div.querySelector('.delete-btn').addEventListener('click',function(e){e.stopPropagation();deleteArt(art.id);});
    div.addEventListener('click',function(){openLightbox(art.id);});
    grid.appendChild(div);
  });
  grid.scrollTop=0;
}

function openLightbox(id){
  const art=arts.find(a=>a.id===id);if(!art)return;
  document.getElementById('lb-img').src=art.imgSrc;
  document.getElementById('lb-author').textContent=art.author;
  document.getElementById('lightbox').classList.add('open');
}
function deleteArt(id){
  const idx=arts.findIndex(a=>a.id===id);
  if(idx===-1)return;
  const pin=document.querySelector('#pins-overlay .pin-el[data-id="'+id+'"]');
  if(pin)pin.remove();
  arts.splice(idx,1);
  rebuildGrid();
  updateCount();
  // IndexedDB에서 해당 항목만 삭제
  openDB(function(db){
    db.transaction(STORE,'readwrite').objectStore(STORE).delete(id);
    try{
      localStorage.setItem('artbonbon_colorIdx',String(colorIdx));
      localStorage.setItem('artbonbon_bandCursors',JSON.stringify(bandCursors));
    }catch(e){}
  });
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}
function updateCount(){
  const el=document.getElementById('count-num');
  el.textContent=arts.length;
  el.classList.remove('count-pop');void el.offsetWidth;el.classList.add('count-pop');
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeLightbox();closeModal();}});

</script>
